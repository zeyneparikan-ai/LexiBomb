<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXIBOMB | Kelime İmha Hattı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <h1 class="game-title">LEXIBOMB</h1>

        <div class="header">
            <div class="score-board">Skor: <span id="score">0</span></div>
            <div class="timer-box" id="timer-container">
                <span id="bomb-emoji">💣</span> <span id="timer">45</span>s
            </div>
        </div>

        <div class="word-grid" id="grid"></div>

        <div class="input-area">
            <input type="text" id="word-input" maxlength="5" placeholder="5 harfli kelime yaz..." autocomplete="off">
            <p id="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
